<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TouraCore Secrets</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg:        #d9d4c6;
    --bg-2:      #ccc6b4;
    --surface:   #f1ede5;
    --surface-2: #e3dfd3;
    --line:      #c8c2b1;
    --line-2:    #a8a190;
    --text:      #1f1e1c;
    --text-2:    #4a463f;
    --text-3:    #6f6a5d;
    --accent:    #c96442;
    --accent-2:  #b8553a;
    --ok:        #2f855a;
    --ok-bg:     #e8f3eb;
    --warn:      #b88419;
    --warn-bg:   #faf0d8;
    --err:       #b3392e;
    --err-bg:    #faeae6;
    --info:      #2563b8;
    --info-bg:   #e6efff;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; }
  .badge-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .scroll-soft::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-soft::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }

  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; }
  .card-soft { background: var(--surface-2); border: 1px solid var(--line); border-radius: 10px; }
  .card-hover:hover { border-color: var(--line-2); background: var(--surface); }
  .text-muted { color: var(--text-2); }
  .text-faint { color: var(--text-3); }
  .btn { border-radius: 8px; padding: 6px 12px; font-size: 12px; transition: all 0.15s; }
  .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--line); }
  .btn-secondary:hover { background: white; border-color: var(--line-2); }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-2); }
  .btn-info { background: var(--info-bg); color: var(--info); border: 1px solid #c5d8f5; }
  .btn-info:hover { background: white; }
  .input { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--text); }
  .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,100,66,0.12); }

  .pill-ok { background: var(--ok-bg); color: var(--ok); }
  .pill-warn { background: var(--warn-bg); color: var(--warn); }
  .pill-err { background: var(--err-bg); color: var(--err); }
  .pill-info { background: var(--info-bg); color: var(--info); }
  .pill-mute { background: var(--surface-2); color: var(--text-3); }

  .dot-ok { background: var(--ok); }
  .dot-warn { background: var(--warn); }
  .dot-err { background: var(--err); }
  .dot-info { background: var(--info); }
  .dot-mute { background: var(--text-3); }
</style>
</head>
<body>
<div id="app"></div>

<script>
const TOKEN = '__SESSION_TOKEN__'
const api = (path, init = {}) => fetch(path + (path.includes('?') ? '&' : '?') + 't=' + TOKEN, init).then(r => r.json())

const STATUS_LABEL = {
  healthy:    { dot: 'dot-ok',   pill: 'pill-ok',   label: 'Healthy' },
  partial:    { dot: 'dot-warn', pill: 'pill-warn', label: 'Partial config' },
  failed:     { dot: 'dot-err',  pill: 'pill-err',  label: 'Auth failed' },
  stale:      { dot: 'dot-warn', pill: 'pill-warn', label: 'Stale' },
  notconf:    { dot: 'dot-mute', pill: 'pill-mute', label: 'Not configured' },
  configured: { dot: 'dot-info', pill: 'pill-info', label: 'Configured' },
}

function statusOf(prov) {
  const s = prov.status
  if (s.configured === 0) return 'notconf'
  if (s.configured < s.total) return 'partial'
  if (s.testOk === false) return 'failed'
  if (prov.rotateMaxAgeDays && s.staleDays && s.staleDays > prov.rotateMaxAgeDays) return 'stale'
  if (s.testOk === true) return 'healthy'
  return 'configured'
}

let state = { providers: [], vercelLinked: false, modal: null, toast: null }

async function refresh() {
  const r = await api('/api/overview')
  state.providers = r.providers
  state.vercelLinked = r.vercelLinked
  render()
}

function toast(msg, kind = 'ok') {
  state.toast = { msg, kind }
  render()
  setTimeout(() => { state.toast = null; render() }, 3500)
}

async function openProvider(id) {
  const prov = state.providers.find(p => p.id === id)
  if (!prov) return
  state.modal = { kind: 'provider', prov, testResult: null, testing: false }
  render()
}

async function runTest(id) {
  if (!state.modal) return
  state.modal.testing = true; render()
  const r = await api('/api/test/' + id, { method: 'POST' })
  state.modal.testing = false
  state.modal.testResult = r
  render()
}

async function openDashboard(url) {
  await api('/api/open', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) })
  toast('Opened in browser')
}

function startRotate(id) {
  const prov = state.providers.find(p => p.id === id)
  if (!prov) return
  const isAutoSecret = prov.id === 'cron' || prov.id === 'jwt'
  state.modal = {
    kind: 'rotate', prov,
    autoGenerate: isAutoSecret,
    values: Object.fromEntries(prov.fields.map(f => [f.env, ''])),
    redeploy: false, working: false, result: null,
  }
  render()
}

async function submitRotate() {
  const m = state.modal
  if (!m || m.kind !== 'rotate') return
  m.working = true; render()
  const r = await api('/api/rotate/' + m.prov.id, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      autoGenerate: m.autoGenerate,
      values: m.autoGenerate ? undefined : m.values,
      redeploy: m.redeploy,
    }),
  })
  m.working = false
  m.result = r
  render()
  if (r.ok) {
    toast('Credentials rotated · .env.local + Vercel synced')
    setTimeout(refresh, 600)
  } else {
    toast('Rotation completed with issues', 'warn')
  }
}

function closeModal() { state.modal = null; render() }

async function loadDiff() {
  state.modal = { kind: 'diff', loading: true, rows: [] }; render()
  const r = await api('/api/diff')
  state.modal.loading = false
  state.modal.rows = r.rows ?? []
  render()
}

// ──── Render ────
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag)
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v
    else if (k === 'style') e.setAttribute('style', v)
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v)
    else if (k === 'html') e.innerHTML = v
    else e.setAttribute(k, v)
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue
    if (typeof c === 'string') e.appendChild(document.createTextNode(c))
    else e.appendChild(c)
  }
  return e
}

function render() {
  const root = document.getElementById('app')
  root.innerHTML = ''
  root.appendChild(renderApp())
}

function renderApp() {
  return el('div', { class: 'max-w-6xl mx-auto px-6 py-10' },
    renderHeader(),
    renderSummary(),
    renderProviders(),
    state.modal ? renderModal() : null,
    state.toast ? renderToast() : null,
  )
}

function renderHeader() {
  return el('header', { class: 'flex items-center justify-between mb-10' },
    el('div', {},
      el('div', { class: 'flex items-center gap-3' },
        el('div', {
          class: 'w-10 h-10 rounded-xl flex items-center justify-center',
          style: 'background: linear-gradient(135deg, #c96442 0%, #d97757 100%); box-shadow: 0 4px 12px -4px rgba(201,100,66,0.4);'
        },
          el('span', { html: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>' })
        ),
        el('div', {},
          el('h1', { class: 'text-xl font-semibold tracking-tight' }, 'Secrets Manager'),
          el('p', { class: 'text-xs text-muted mt-0.5' },
            'Localhost-only · ',
            state.vercelLinked
              ? el('span', { style: 'color: var(--ok); font-weight: 500;' }, '● Vercel linked')
              : el('span', { style: 'color: var(--warn); font-weight: 500;' }, '● Vercel not linked')
          ),
        ),
      ),
    ),
    el('div', { class: 'flex gap-2' },
      el('button', { class: 'btn btn-secondary', onclick: () => loadDiff() }, '⇄ Vercel diff'),
      el('button', { class: 'btn btn-secondary', onclick: () => refresh() }, '↻ Refresh'),
    ),
  )
}

function renderSummary() {
  const total = state.providers.length
  const healthy = state.providers.filter(p => statusOf(p) === 'healthy').length
  const issues = state.providers.filter(p => ['failed', 'stale'].includes(statusOf(p))).length
  const missing = state.providers.filter(p => statusOf(p) === 'notconf').length
  return el('section', { class: 'grid grid-cols-2 md:grid-cols-4 gap-3 mb-10' },
    summaryCard('Total', total, ''),
    summaryCard('Healthy', healthy, 'color: var(--ok);'),
    summaryCard('Issues', issues, issues > 0 ? 'color: var(--err);' : ''),
    summaryCard('Missing', missing, 'color: var(--text-3);'),
  )
}

function summaryCard(label, value, valueStyle) {
  return el('div', { class: 'card p-4' },
    el('div', { class: 'text-[10px] uppercase tracking-[0.14em] text-faint font-semibold' }, label),
    el('div', { class: 'mt-1 text-2xl font-semibold tracking-tight', style: valueStyle }, String(value)),
  )
}

function renderProviders() {
  const byCat = {}
  for (const p of state.providers) {
    if (!byCat[p.category]) byCat[p.category] = []
    byCat[p.category].push(p)
  }
  // Order categories: storage, auth, payments, email, security, integrations, observability
  const order = ['storage', 'auth', 'payments', 'email', 'security', 'integrations', 'observability']
  const sorted = order.filter(k => byCat[k]).map(k => [k, byCat[k]])
  return el('section', { class: 'space-y-7' },
    ...sorted.map(([cat, items]) => {
      const m = items[0].categoryMeta
      return el('div', {},
        // Category header
        el('div', { class: 'flex items-start gap-3 mb-4' },
          el('div', {
            class: 'shrink-0 w-12 h-12 rounded-xl flex items-center justify-center text-2xl',
            style: 'background: var(--surface); border: 1px solid var(--line);',
          }, m ? m.icon : '📦'),
          el('div', { class: 'min-w-0 flex-1' },
            el('h3', { class: 'text-[15px] font-semibold tracking-tight' }, m ? m.title : items[0].categoryLabel),
            el('p', { class: 'text-[12px] text-muted mt-0.5 leading-snug' }, m ? m.description : ''),
          ),
          el('div', {
            class: 'shrink-0 px-2 py-0.5 text-[10px] font-semibold rounded-full',
            style: 'background: var(--surface-2); color: var(--text-3);',
          }, `${items.length} ${items.length === 1 ? 'item' : 'items'}`),
        ),
        // Cards 2 cols
        el('div', { class: 'grid grid-cols-1 md:grid-cols-2 gap-2.5' },
          ...items.map(p => providerCard(p))
        ),
      )
    })
  )
}

function providerCard(prov) {
  const key = statusOf(prov)
  const meta = STATUS_LABEL[key]
  const last = prov.status.lastRotationTs ? `${prov.status.staleDays}d ago` : 'never'
  return el('button', {
    class: 'group card card-hover transition px-3.5 py-3 text-left w-full',
    onclick: () => openProvider(prov.id),
  },
    el('div', { class: 'flex items-start gap-3' },
      // Status dot column
      el('div', { class: 'pt-1.5 shrink-0' },
        el('span', { class: `badge-dot ${meta.dot}` }),
      ),
      // Content
      el('div', { class: 'min-w-0 flex-1' },
        el('div', { class: 'flex items-center justify-between gap-2' },
          el('div', { class: 'font-medium text-[13px] truncate', style: 'color: var(--text);' }, prov.name),
          el('span', { class: 'text-faint group-hover:text-muted transition text-xs' }, '→'),
        ),
        el('div', { class: 'flex items-center gap-2 mt-1 text-[11px]' },
          el('span', { class: meta.pill === 'pill-mute' ? 'text-faint' : '', style: pillStyle(meta) }, meta.label),
          el('span', { class: 'text-faint' }, '·'),
          el('span', { class: 'text-muted' }, `${prov.status.configured}/${prov.status.total} env`),
          el('span', { class: 'text-faint' }, '·'),
          el('span', { class: 'text-muted' }, last),
        ),
      ),
    ),
  )
}

function pillStyle(meta) {
  // Inline tiny pill for cards: just text color, no bg (cards already busy)
  const colorMap = {
    'pill-ok': 'color: var(--ok); font-weight: 500;',
    'pill-warn': 'color: var(--warn); font-weight: 500;',
    'pill-err': 'color: var(--err); font-weight: 500;',
    'pill-info': 'color: var(--info); font-weight: 500;',
    'pill-mute': 'color: var(--text-3);',
  }
  return colorMap[meta.pill] ?? ''
}

function renderModal() {
  const m = state.modal
  return el('div', {
    class: 'fixed inset-0 z-50 flex items-center justify-center p-4',
    style: 'background: rgba(31,30,28,0.32); backdrop-filter: blur(6px);',
    onclick: (e) => { if (e.target === e.currentTarget) closeModal() },
  },
    el('div', {
      class: 'card w-full max-w-2xl max-h-[90vh] overflow-y-auto scroll-soft',
      style: 'box-shadow: 0 24px 64px -16px rgba(31,30,28,0.18);',
    },
      m.kind === 'provider' ? providerModal(m) :
      m.kind === 'rotate' ? rotateModal(m) :
      m.kind === 'diff' ? diffModal(m) : null
    )
  )
}

function providerModal(m) {
  const prov = m.prov
  const key = statusOf(prov)
  const meta = STATUS_LABEL[key]
  return el('div', { class: 'p-6' },
    el('div', { class: 'flex items-start justify-between mb-4' },
      el('div', {},
        el('div', { class: 'text-[10px] uppercase tracking-[0.18em] text-faint font-semibold' }, prov.categoryLabel),
        el('h2', { class: 'text-lg font-semibold mt-1' }, prov.name),
        el('div', { class: 'flex items-center gap-2 mt-2' },
          el('span', { class: `inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-medium ${meta.pill}` },
            el('span', { class: `badge-dot ${meta.dot}` }),
            meta.label,
          ),
          prov.status.testMessage ? el('span', { class: 'text-xs text-muted' }, prov.status.testMessage) : null,
        ),
      ),
      el('button', { class: 'text-faint hover:text-muted text-xl leading-none px-2', onclick: closeModal }, '×'),
    ),

    el('div', { class: 'mt-5 space-y-2' },
      ...prov.fields.map(f => el('div', { class: 'flex items-center justify-between gap-3 px-3 py-2.5 card-soft' },
        el('div', { class: 'min-w-0' },
          el('div', { class: 'text-xs font-mono', style: 'color: var(--text);' }, f.env, f.optional ? el('span', { class: 'text-faint' }, ' (optional)') : null),
          el('div', { class: 'text-[11px] text-muted mt-0.5' }, f.label),
        ),
        el('div', { class: 'text-xs font-mono text-muted truncate ml-3' }, f.present ? (f.sensitive ? f.masked : f.masked ?? '—') : el('span', { class: 'text-faint' }, '—')),
      )),
    ),

    el('div', { class: 'flex flex-wrap gap-2 mt-6' },
      prov.dashboardUrl ? el('button', { class: 'btn btn-secondary', onclick: () => openDashboard(prov.dashboardUrl) }, '🌐 Dashboard') : null,
      prov.rotateUrl && prov.rotateUrl !== prov.dashboardUrl ? el('button', { class: 'btn btn-secondary', onclick: () => openDashboard(prov.rotateUrl) }, '🔄 Rotate page') : null,
      prov.docsUrl ? el('button', { class: 'btn btn-secondary', onclick: () => openDashboard(prov.docsUrl) }, '📖 Docs') : null,
      el('div', { class: 'flex-1' }),
      el('button', { class: 'btn btn-info', disabled: m.testing, onclick: () => runTest(prov.id) }, m.testing ? 'Testing…' : '🩺 Test'),
      el('button', { class: 'btn btn-primary font-medium', onclick: () => startRotate(prov.id) }, '🔄 Rotate'),
    ),

    m.testResult ? el('div', {
      class: 'mt-4 p-3 rounded-lg text-xs font-mono',
      style: m.testResult.ok
        ? 'background: var(--ok-bg); color: var(--ok); border: 1px solid #c4e3cc;'
        : 'background: var(--err-bg); color: var(--err); border: 1px solid #f0c8c2;'
    }, (m.testResult.ok ? '✓ ' : '✗ ') + m.testResult.message) : null,

    el('details', { class: 'mt-5 group' },
      el('summary', { class: 'text-xs text-muted hover:text-slate-700 transition flex items-center gap-2' },
        el('span', { class: 'group-open:rotate-90 transition' }, '▸'), 'Rotation playbook'
      ),
      el('ol', { class: 'mt-3 space-y-1.5 text-xs text-muted pl-5 list-decimal' },
        ...prov.rotateInstructions.map(s => el('li', {}, s))
      ),
    ),
  )
}

function rotateModal(m) {
  const prov = m.prov
  return el('div', { class: 'p-6' },
    el('div', { class: 'flex items-start justify-between mb-4' },
      el('div', {},
        el('div', { class: 'text-[10px] uppercase tracking-[0.18em] text-faint font-semibold' }, 'Rotate credentials'),
        el('h2', { class: 'text-lg font-semibold mt-1' }, prov.name),
      ),
      el('button', { class: 'text-faint hover:text-muted text-xl leading-none px-2', onclick: closeModal }, '×'),
    ),

    m.autoGenerate
      ? el('div', { class: 'card-soft p-4 mb-4' },
          el('div', { class: 'text-xs font-medium mb-1' }, '🎲 Auto-generate'),
          el('p', { class: 'text-xs text-muted' }, 'Genero un nuovo segreto random 32-byte hex (256 bit) e lo sincronizzo su Vercel + .env.local. Niente da copiare/incollare.'),
        )
      : el('div', { class: 'space-y-3 mb-4' },
          ...prov.fields.map(f => el('div', { class: 'space-y-1' },
            el('label', { class: 'flex items-center justify-between text-xs' },
              el('span', { class: 'font-mono', style: 'color: var(--text);' }, f.env, f.optional ? el('span', { class: 'text-faint' }, ' (optional)') : null),
              el('span', { class: 'text-faint' }, f.label),
            ),
            el('input', {
              type: f.sensitive ? 'password' : 'text',
              class: 'input w-full font-mono',
              placeholder: f.sensitive ? '••••••••' : 'value',
              oninput: (e) => { m.values[f.env] = e.target.value },
            }),
          ))
        ),

    el('label', { class: 'flex items-center gap-2 mb-4 cursor-pointer card-soft p-3' },
      el('input', { type: 'checkbox', style: 'accent-color: var(--accent);', onchange: (e) => { m.redeploy = e.target.checked } }),
      el('span', { class: 'text-xs' }, 'Trigger redeploy production after sync'),
    ),

    prov.rotateUrl ? el('button', {
      class: 'btn btn-secondary w-full mb-4',
      onclick: () => openDashboard(prov.rotateUrl),
    }, `🌐 Open ${prov.name} dashboard to get values`) : null,

    el('div', { class: 'flex gap-2 justify-end' },
      el('button', { class: 'btn btn-secondary', onclick: closeModal }, 'Cancel'),
      el('button', { class: 'btn btn-primary font-medium', disabled: m.working, onclick: submitRotate }, m.working ? 'Working…' : 'Apply'),
    ),

    m.result ? renderResult(m.result) : null,
  )
}

function renderResult(r) {
  const lineStyle = (ok) => ok
    ? 'color: var(--ok);'
    : 'color: var(--err);'
  return el('div', { class: 'mt-4 card-soft p-3 text-xs space-y-1.5' },
    r.preTest ? el('div', { style: r.preTest.ok ? 'color: var(--ok);' : 'color: var(--warn);' },
      (r.preTest.ok ? '✓' : '⚠') + ' Pre-persist test: ' + r.preTest.message
    ) : null,
    el('div', { style: lineStyle(r.envLocalOk) }, (r.envLocalOk ? '✓' : '✗') + ' .env.local'),
    r.vercelOk !== null
      ? el('div', { style: lineStyle(r.vercelOk) }, (r.vercelOk ? '✓' : '✗') + ' Vercel sync (production + preview + development)')
      : el('div', { class: 'text-faint' }, '○ Vercel skipped (not linked)'),
    r.redeployUrl ? el('div', { style: 'color: var(--info);' }, '↗ Deploying https://' + r.redeployUrl) : null,
    r.generatedSecret ? el('div', { style: 'color: var(--ok);' }, '🎲 Generated: ' + r.generatedSecret) : null,
  )
}

function diffModal(m) {
  return el('div', { class: 'p-6' },
    el('div', { class: 'flex items-start justify-between mb-4' },
      el('h2', { class: 'text-lg font-semibold' }, 'Vercel ↔ .env.local'),
      el('button', { class: 'text-faint hover:text-muted text-xl leading-none px-2', onclick: closeModal }, '×'),
    ),
    el('div', { class: 'flex items-center gap-3 mb-4 text-[11px] text-muted' },
      el('span', {}, el('b', { style: 'color: var(--text);' }, 'L'), ' = .env.local'),
      el('span', {}, el('b', { style: 'color: var(--text);' }, 'P'), ' = Production'),
      el('span', {}, el('b', { style: 'color: var(--text);' }, 'V'), ' = Preview'),
      el('span', {}, el('b', { style: 'color: var(--text);' }, 'D'), ' = Development'),
    ),
    m.loading ? el('div', { class: 'text-sm text-muted' }, 'Loading…') :
    el('div', { class: 'space-y-1' },
      ...m.rows.map(r => el('div', { class: 'flex items-center gap-2 px-3 py-2 rounded text-xs font-mono card-soft' },
        cellBadge(r.inLocal, 'L'),
        cellBadge(r.inProd, 'P'),
        cellBadge(r.inPreview, 'V'),
        cellBadge(r.inDev, 'D'),
        el('span', { class: 'truncate ml-1', style: 'color: var(--text);' }, r.key),
      ))
    )
  )
}

function cellBadge(present, label) {
  return el('span', {
    class: 'inline-flex items-center justify-center w-5 h-5 rounded text-[10px] font-bold',
    style: present
      ? 'background: var(--ok-bg); color: var(--ok);'
      : 'background: var(--surface-2); color: var(--text-3);'
  }, label)
}

function renderToast() {
  const t = state.toast
  const bg = t.kind === 'warn' ? 'var(--warn)' : 'var(--ok)'
  return el('div', {
    class: 'fixed bottom-6 right-6 px-4 py-2 rounded-lg text-sm font-medium z-50',
    style: `background: ${bg}; color: white; box-shadow: 0 8px 24px -8px rgba(31,30,28,0.3);`,
  }, t.msg)
}

refresh()
</script>
</body>
